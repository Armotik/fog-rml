name: CI & SonarCloud Coverage

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarQube Cloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd719
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests and generate coverage report
        run: |
          # Exécute la suite de tests et génère coverage.xml
          pytest --suite coverage --cov=src/pyhartig --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
